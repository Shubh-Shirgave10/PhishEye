<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(56, 189, 248, 0.2);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            width: 340px;
            margin: 0;
            padding: 24px;
            background-color: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #0284c7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Auth Section */
        #auth-section {
            text-align: center;
        }

        .auth-intro {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .primary-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #0284c7 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.3);
        }

        .primary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Main Section */
        .url-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            word-break: break-all;
            max-height: 44px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .status-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(10px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .status-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .status-text {
            font-weight: 700;
            font-size: 18px;
            display: block;
            margin-bottom: 4px;
        }

        .status-desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        .safe-mode {
            border-color: #22c55e;
            color: #22c55e;
        }

        .unsafe-mode {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* Scanning Toggle */
        .toggle-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #1e293b;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .secondary-btn {
            width: 100%;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: rgba(148, 163, 184, 0.4);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo-icon">👁️</div>
        <h3>PhishEye</h3>
    </div>

    <div id="auth-section">
        <p class="auth-intro">Protect your browsing by connecting your dashboard account.</p>
        <div class="input-group">
            <input type="text" id="api-token" placeholder="Paste Access Token">
        </div>
        <button id="save-token" class="primary-btn">Link Account</button>
        <p style="font-size: 11px; color: var(--text-muted); margin-top: 16px; line-height: 1.4;">
            Find your token in <br><b>Dashboard > Get Started</b>
        </p>
    </div>

    <div id="main-section" class="hidden">
        <div class="url-box" id="current-url">Detecting URL...</div>

        <div id="scan-status" class="status-card">
            <span class="status-icon" id="status-icon">🛡️</span>
            <span class="status-text" id="status-title">System Ready</span>
            <span class="status-desc" id="status-desc">Click scran to start protection</span>
        </div>

        <div class="toggle-section">
            <span class="toggle-label">Automatic Protection</span>
            <label class="switch">
                <input type="checkbox" id="auto-scan">
                <span class="slider"></span>
            </label>
        </div>

        <button id="scan-btn" class="primary-btn">Scan Current Page</button>
        <button id="logout-btn" class="secondary-btn">Disconnect Account</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
