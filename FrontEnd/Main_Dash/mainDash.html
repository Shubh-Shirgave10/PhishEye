<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishEye Dashboard</title>
  <link rel="stylesheet" href="../History/history.css">
  <link rel="stylesheet" href="../navbar.css">
  <link rel="stylesheet" href="../theme.css">
  <script src="../theme.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <!-- Top Navigation Bar -->
    <header class="top-bar">
      <div class="nav-left">
        <!-- Back Button -->
        <button id="backBtn" class="back-btn" title="Go Back">
          <i data-lucide="arrow-left"></i>
        </button>

        <!-- User Icon Trigger -->
        <button id="userMenuBtn" class="user-menu-btn">
          <div class="user-avatar">U</div>
        </button>

        <!-- Logo -->
        <div class="logo-wrapper">
          <div class="logo-icon">
            <i data-lucide="eye"></i>
          </div>
          <span class="brand-name">PhishEye</span>
        </div>
      </div>

      <div class="header-right">
        <div class="status-badge">
          <div class="pulse-dot"></div>
          <span>Live</span>
        </div>
      </div>
    </header>

    <!-- Navigation Panel (Hidden by default) -->
    <div id="navPanel" class="nav-panel hidden">
      <div class="panel-header">
        <div class="panel-user-info">
          <div class="panel-user-avatar">
            <i data-lucide="user"></i>
          </div>
          <div>
            <span class="panel-user-name">User</span>
            <span class="panel-user-email">user@example.com</span>
          </div>
        </div>
      </div>
      <nav class="panel-menu">
        <button class="panel-item active" data-tab="dashboard">
          <i data-lucide="bar-chart-3"></i>
          <span>Dashboard</span>
        </button>
        <button class="panel-item" data-tab="quickscan">
          <i data-lucide="scan"></i>
          <span>Quick Scan</span>
        </button>
        <button class="panel-item" data-tab="history">
          <i data-lucide="clock"></i>
          <span>History</span>
        </button>
        <button class="panel-item" data-tab="settings">
          <i data-lucide="settings"></i>
          <span>Settings</span>
        </button>
        <button class="panel-item" data-tab="about">
          <i data-lucide="info"></i>
          <span>About</span>
        </button>
        <div class="panel-divider"></div>
        <button class="panel-item logout">
          <i data-lucide="log-out"></i>
          <span>Logout</span>
        </button>
      </nav>
    </div>

    <main class="page" id="dashboard-view">
      <header class="hero" data-animate>
        <div>
          <p class="eyebrow">Real-Time Protection Status</p>
          <h1>Current Scan Result</h1>
          <p class="lead">Viewing the latest website scanned by the PhishEye Engine.</p>
        </div>
      </header>

      <section class="top-cards" id="latestScanContainer" data-animate>
        <!-- Latest Scan Injected Here -->
        <p class="text-muted" style="margin-left: 20px;">Fetching latest scan...</p>
      </section>

      <!-- Analytics Section -->
      <section class="middle" data-animate>
        <div class="analytics-grid"
          style="grid-template-columns: repeat(4, 1fr); grid-template-rows: auto; width: 100%; max-width: 100%; grid-column: 1 / -1;">
          <article class="analytics-card total">
            <div class="icon-ring">
              <span class="icon">🌐</span>
            </div>
            <div>
              <p>Latest Website</p>
              <strong id="stat-domain" style="font-size: 1rem; word-break: break-all;">-</strong>
            </div>
          </article>
          <article class="analytics-card safe">
            <div class="icon-ring">
              <span class="icon">🛡️</span>
            </div>
            <div>
              <p>Safe %</p>
              <strong id="stat-safe">0%</strong>
            </div>
          </article>
          <article class="analytics-card suspicious">
            <div class="icon-ring">
              <span class="icon">⚠️</span>
            </div>
            <div>
              <p>Suspicious %</p>
              <strong id="stat-susp">0%</strong>
            </div>
          </article>
          <article class="analytics-card malicious">
            <div class="icon-ring">
              <span class="icon">🚫</span>
            </div>
            <div>
              <p>Risk %</p>
              <strong id="stat-malw">0%</strong>
            </div>
          </article>
        </div>
      </section>
    </main>


    <script src="mainDash.js"></script>
</body>

</html>
