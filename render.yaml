services:
  - type: web
    name: phisheye-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --chdir BackEnd run:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: phisheye-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12 # Render default but good to specify

databases:
  - name: phisheye-db
    plan: free # Use "free" for development or "starter" for production
    databaseName: phisheye_db
    user: phisheye_user
